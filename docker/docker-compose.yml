services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ullrai_starter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ullrai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ullrai_starter
      SKIP_ENV_VALIDATION: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ullrai-network

  # Next.js Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL to the public deployment origin}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ullrai_starter

      # Database connection pool settings
      DB_POOL_SIZE: 20
      DB_IDLE_TIMEOUT: 300
      DB_MAX_LIFETIME: 14400
      DB_CONNECT_TIMEOUT: 30
      RATE_LIMIT_IP_HEADER: ${RATE_LIMIT_IP_HEADER:-x-forwarded-for}

      # Application URL
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL}

      # Auth Secret (generate a new one for production)
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}

      # OAuth (optional - configure as needed)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}

      # Email service (configure with your Resend API key)
      RESEND_API_KEY: ${RESEND_API_KEY:?Set RESEND_API_KEY}
      RESEND_EMAIL_FROM: ${RESEND_EMAIL_FROM:?Set RESEND_EMAIL_FROM}

      # Cloudflare R2 Storage (configure with your credentials)
      R2_ENDPOINT: ${R2_ENDPOINT:?Set R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:?Set R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:?Set R2_PUBLIC_URL}

      # Payment provider (configure with your Creem credentials)
      CREEM_API_KEY: ${CREEM_API_KEY:?Set CREEM_API_KEY}
      CREEM_ENVIRONMENT: ${CREEM_ENVIRONMENT:-test_mode}
      CREEM_WEBHOOK_SECRET: ${CREEM_WEBHOOK_SECRET:?Set CREEM_WEBHOOK_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ullrai-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis (optional - for caching and sessions)
  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ullrai-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ullrai-network:
    driver: bridge
