name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: saas_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d saas_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saas_ci
      RATE_LIMIT_IP_HEADER: x-forwarded-for
      BETTER_AUTH_SECRET: ci-only-secret-at-least-32-characters
      RESEND_API_KEY: re_ci_placeholder
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: ci-placeholder
      R2_SECRET_ACCESS_KEY: ci-placeholder
      R2_BUCKET_NAME: ci-placeholder
      R2_PUBLIC_URL: https://cdn.example.com
      CREEM_API_KEY: creem_ci_placeholder
      CREEM_ENVIRONMENT: test_mode
      CREEM_WEBHOOK_SECRET: creem_ci_webhook_placeholder
      NEXT_PUBLIC_APP_URL: https://example.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm prettier:check
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test --runInBand
      - run: pnpm build
